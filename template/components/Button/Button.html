<button
    type="button"
    data-text="label"
    data-onclick="handleClick"
    data-class-bg-green-600="variant !== 'secondary'"
    data-class-bg-zinc-200="variant === 'secondary'"
    data-class-text-white="variant !== 'secondary'"
    data-class-text-zinc-900="variant === 'secondary'"
    data-class-hover-bg-green-700="variant !== 'secondary'"
    data-class-hover-bg-zinc-300="variant === 'secondary'"
    class="px-6 py-3 rounded-lg font-semibold transition-all hover:-translate-y-0.5 hover:shadow-lg disabled:opacity-60 disabled:cursor-not-allowed"
></button>
