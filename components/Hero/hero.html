<div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-center mb-16 py-8">
    <div class="lg:col-span-7 reveal-1">
        <h1 class="text-6xl lg:text-7xl font-extrabold tracking-tight mb-6 leading-[1.05] text-zinc-900 dark:text-zinc-50" data-text="title"></h1>
        <p class="text-xl text-zinc-500 dark:text-zinc-400 mb-10 leading-relaxed max-w-xl" data-text="subtitle"></p>
        <div class="flex flex-wrap gap-4" data-outlet="buttons"></div>
    </div>
    <div class="hidden lg:flex lg:col-span-5 items-center justify-center bento-card h-[420px] reveal-2 bg-gradient-to-br from-zinc-50 to-zinc-100 dark:from-zinc-900/50 dark:to-zinc-950/50 relative group">
        <div class="absolute inset-0 bg-grid-zinc-200/50 dark:bg-grid-white/[0.02] [mask-image:radial-gradient(ellipse_at_center,black,transparent)]"></div>
        <div class="animate-float relative">
            <div class="w-32 h-32 bg-green-600/10 rounded-3xl flex items-center justify-center border border-green-600/20 shadow-2xl backdrop-blur-sm group-hover:scale-110 transition-transform duration-500">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-16 h-16 text-green-600 dark:text-green-400 drop-shadow-lg">
                    <polyline points="16 18 22 12 16 6"></polyline>
                    <polyline points="8 6 2 12 8 18"></polyline>
                </svg>
            </div>
        </div>
    </div>
</div>
