<button
    type="button"
    data-text="label"
    data-onclick="handleClick"
    data-class-btn-primary="variant !== 'secondary'"
    data-class-btn-secondary="variant === 'secondary'"
    data-class-px-6="true"
    data-class-py-3="true"
    data-class-rounded-2xl="true"
    data-class-font-bold="true"
    data-class-transition-all="true"
    data-class-duration-200="true"
    data-class-active:scale-[0.97]="true"
    data-class-hover:shadow-lg="variant !== 'secondary'"
    data-class-hover:shadow-emerald-500/20="variant !== 'secondary'"
    data-class-bg-emerald-500="variant !== 'secondary'"
    data-class-text-white="variant !== 'secondary'"
    data-class-bg-zinc-100="variant === 'secondary'"
    data-class-dark:bg-zinc-800="variant === 'secondary'"
    data-class-text-zinc-900="variant === 'secondary'"
    data-class-dark:text-zinc-100="variant === 'secondary'"
    class="btn-premium disabled:opacity-40 disabled:cursor-not-allowed"
></button>
