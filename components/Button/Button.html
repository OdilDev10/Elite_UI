<!-- Button Component (solo buttons, links van en Link.js) -->
<button type="button" class="hero-btn hero-btn-{{variant}}">{{label}}</button>

<style>
    .hero-btn {
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s;
        font-size: 16px;
    }

    .hero-btn-primary {
        background: #007bff;
        color: white;
    }

    .hero-btn-primary:hover {
        background: #0056b3;
    }

    .hero-btn-secondary {
        background: #6c757d;
        color: white;
    }

    .hero-btn-secondary:hover {
        background: #5a6268;
    }

    .hero-btn:active {
        transform: scale(0.98);
    }

    .hero-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }
</style>
