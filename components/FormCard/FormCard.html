<div class="col-span-full bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl p-5">
    <h3 class="font-bold text-sm mb-1" data-text="title"></h3>
    <p class="text-sm text-zinc-600 dark:text-zinc-400 mb-4" data-text="subtitle"></p>
    <form id="contact-form" class="flex flex-col gap-3" data-onclick="handleSubmit">
        <div class="flex flex-col gap-1">
            <label class="text-xs font-semibold text-zinc-600 dark:text-zinc-400">Name</label>
            <input type="text" name="name" placeholder="John Doe" required class="px-3 py-2 border border-zinc-300 dark:border-zinc-700 rounded-lg bg-white dark:bg-zinc-950 text-sm focus:outline-none focus:border-green-600">
        </div>
        <div class="flex flex-col gap-1">
            <label class="text-xs font-semibold text-zinc-600 dark:text-zinc-400">Email</label>
            <input type="email" name="email" placeholder="john@example.com" required class="px-3 py-2 border border-zinc-300 dark:border-zinc-700 rounded-lg bg-white dark:bg-zinc-950 text-sm focus:outline-none focus:border-green-600">
        </div>
        <div class="flex flex-col gap-1">
            <label class="text-xs font-semibold text-zinc-600 dark:text-zinc-400">Message</label>
            <textarea name="message" rows="3" placeholder="Tell us more..." required class="px-3 py-2 border border-zinc-300 dark:border-zinc-700 rounded-lg bg-white dark:bg-zinc-950 text-sm focus:outline-none focus:border-green-600 resize-none"></textarea>
        </div>
        <button type="submit" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg font-medium transition-colors self-start">Send Message</button>
    </form>
    <div class="mt-3 p-3 bg-green-100 dark:bg-green-900/30 border border-green-600 dark:border-green-500 rounded-lg text-sm text-green-700 dark:text-green-400" data-show="formSubmitted">Thanks! Form submitted securely.</div>
</div>
