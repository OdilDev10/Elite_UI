<h3 class="form-title" data-text="title"></h3>
<p class="form-subtitle" data-text="subtitle"></p>
<form class="form-contact" id="contact-form">
    <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" placeholder="John Doe" required>
    </div>
    <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="john@example.com" required>
    </div>
    <div class="form-group">
        <label>Message</label>
        <textarea name="message" rows="3" placeholder="Tell us more..." required></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Send Message</button>
</form>
<!-- Response message con directivas data-show y data-class -->
<div class="form-response message"
     data-show="formSubmitted"
     data-class-success="submitSuccess">
    Thanks! Form submitted securely.
</div>
