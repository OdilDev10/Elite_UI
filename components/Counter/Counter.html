<div class="counter-card">
    <span class="counter-label" data-text="label"></span>
    <div class="counter-controls">
        <button class="counter-btn" data-onclick="decrement" data-bind-disabled="count <= min">−</button>
        <span class="counter-value" data-text="count"></span>
        <button class="counter-btn" data-onclick="increment" data-bind-disabled="count >= max">+</button>
    </div>
</div>
