<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteUI - Vanilla JS Framework</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        emerald: { 500: '#10b981' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="min-h-screen selection:bg-emerald-500/30 bg-[var(--bg)] text-[var(--text)]">

    <!-- Templates -->
    <template id="tmpl-component-theme-toggle">
        <button 
            data-onclick="toggle" 
            class="w-8 h-8 rounded-lg border border-zinc-200 dark:border-zinc-800 flex items-center justify-center transition-all hover:border-emerald-500 hover:bg-emerald-500/5 active:scale-90 bg-white/50 dark:bg-zinc-900/50 backdrop-blur-sm shadow-sm"
        >
            <svg data-if="theme === 'light'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="w-3.5 h-3.5 text-zinc-600"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg data-if="theme === 'dark'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="w-3.5 h-3.5 text-zinc-400"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
    </template>

    <template id="tmpl-component-hero">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 items-stretch mb-8">
            <div class="lg:col-span-8 bento-card p-8 lg:p-12 flex flex-col justify-center reveal-1 bg-gradient-to-br from-white to-zinc-50/30 dark:from-zinc-900 dark:to-zinc-900/20">
                <h1 class="text-4xl lg:text-6xl font-black tracking-tighter mb-4 leading-[1.05] text-zinc-900 dark:text-white" data-text="title"></h1>
                <p class="text-base text-zinc-500 dark:text-zinc-400 mb-8 leading-relaxed max-w-lg font-medium" data-text="subtitle"></p>
                <div class="flex flex-wrap gap-3" data-outlet="buttons"></div>
            </div>
            <div class="lg:col-span-4 bento-card p-8 flex flex-col items-center justify-center relative overflow-hidden group reveal-2 bg-zinc-50/30 dark:bg-zinc-900/10">
                <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,rgba(16,185,129,0.05),transparent_70%)] opacity-0 group-hover:opacity-100 transition-opacity duration-1000"></div>
                <div class="w-16 h-16 rounded-2xl bg-white dark:bg-zinc-800 shadow-xl dark:shadow-black/40 flex items-center justify-center mb-6 relative z-10 animate-float border border-zinc-100 dark:border-zinc-700/30">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-8 h-8 text-emerald-500">
                        <polyline points="16 18 22 12 16 6"></polyline>
                        <polyline points="8 6 2 12 8 18"></polyline>
                    </svg>
                </div>
                <div class="text-center relative z-10">
                    <span class="text-[9px] font-black uppercase tracking-[0.3em] text-emerald-600 dark:text-emerald-400 opacity-70">Enterprise Core</span>
                    <p class="text-[9px] text-zinc-400 mt-2 font-bold opacity-30 tracking-widest">ODINECK TECHNOLOGY</p>
                </div>
            </div>
        </div>
    </template>

    <template id="tmpl-component-feature-card">
        <div class="bento-card p-6 group h-full flex flex-col hover:border-emerald-500/20 transition-all duration-300">
            <div class="w-10 h-10 rounded-xl bg-emerald-500/5 dark:bg-emerald-500/10 flex items-center justify-center mb-5 group-hover:bg-emerald-500 group-hover:text-white transition-all duration-300 group-hover:shadow-lg group-hover:shadow-emerald-500/10">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5" data-html="icon"></svg>
            </div>
            <h3 class="font-bold text-base mb-2 text-zinc-900 dark:text-white tracking-tight" data-text="title"></h3>
            <p class="text-[13px] text-zinc-500 dark:text-zinc-400 leading-relaxed font-medium" data-text="description"></p>
        </div>
    </template>

    <template id="tmpl-component-counter">
        <div class="bento-card p-6 flex flex-col gap-4 min-w-[180px] bg-white dark:bg-zinc-900/50">
            <span class="text-[10px] font-black text-zinc-400 dark:text-zinc-500 uppercase tracking-[0.2em] opacity-70" data-text="label"></span>
            <div class="flex items-center justify-between gap-4">
                <button data-onclick="decrement" data-bind-disabled="count <= min" class="w-8 h-8 flex items-center justify-center border border-zinc-100 dark:border-zinc-800 bg-zinc-50 dark:bg-zinc-800/30 text-zinc-900 dark:text-zinc-100 rounded-lg font-bold hover:border-emerald-500 hover:text-emerald-500 transition-all active:scale-90 disabled:opacity-10 shadow-sm">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" class="w-3 h-3"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
                <span class="text-3xl font-black text-emerald-600 dark:text-emerald-400 tabular-nums tracking-tighter" data-text="count"></span>
                <button data-onclick="increment" data-bind-disabled="count >= max" class="w-10 h-10 flex items-center justify-center border border-zinc-100 dark:border-zinc-800 bg-zinc-50 dark:bg-zinc-800/30 text-zinc-900 dark:text-zinc-100 rounded-lg font-bold hover:border-emerald-500 hover:text-emerald-500 transition-all active:scale-90 disabled:opacity-10 shadow-sm">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" class="w-3 h-3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </div>
        </div>
    </template>

    <!-- Composed page using nested components (like React) -->
    <template id="tmpl-app-home">
        <section class="max-w-6xl mx-auto px-6 py-8">
            <hero-component title="Vanilla JS Framework" subtitle="Zero dependencies. Security first. Production ready infrastructure for modern web apps."></hero-component>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mt-8">
                <feature-card title="Secure" description="Built-in XSS protection, CSRF tokens, and sanitization." icon='<rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path>'></feature-card>
                <feature-card title="Fast" description="Pure vanilla JavaScript with direct DOM manipulation." icon='<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>'></feature-card>
                <feature-card title="Reactive" description="SimpleComponent and SimpleStore for reactive state." icon='<circle cx="12" cy="12" r="3"></circle><line x1="12" y1="5" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="19"></line>'></feature-card>
            </div>
            
            <div class="flex justify-center mt-8">
                <counter-component label="Counter" initial-count="0" min="0" max="10"></counter-component>
            </div>
        </section>
    </template>

    <header class="sticky top-0 z-50 glass border-b border-zinc-200/30 dark:border-zinc-800/30">
        <div class="max-w-6xl mx-auto px-6 py-2.5 flex items-center justify-between">
            <a href="#/" class="flex items-center gap-2.5 font-black text-lg tracking-tighter hover:opacity-70 transition-opacity text-zinc-900 dark:text-white group">
                <div class="w-2.5 h-2.5 bg-emerald-500 rounded-full shadow-[0_0_10px_rgba(16,185,129,0.4)] group-hover:scale-110 transition-transform"></div>
                EliteUI
            </a>
            <div id="component-theme-toggle"></div>
        </div>
    </header>

    <main id="app-home"></main>

    <footer class="border-t border-zinc-200/30 dark:border-zinc-800/30 mt-12 bg-zinc-50/10 dark:bg-zinc-900/10">
        <div class="max-w-6xl mx-auto px-6 py-8 flex flex-col md:flex-row items-center justify-between gap-4 text-[11px] text-zinc-500 dark:text-zinc-400">
            <div class="flex items-center gap-3">
                <div class="w-6 h-6 rounded bg-zinc-900 dark:bg-white flex items-center justify-center text-white dark:text-zinc-900 font-black text-[10px]">O</div>
                <p class="font-bold tracking-tight opacity-50 uppercase">ODINECK TECHNOLOGY © 2026</p>
            </div>
            <div class="flex gap-6 font-bold tracking-tight uppercase opacity-60">
                <a href="https://odineck.com" target="_blank" class="hover:text-emerald-500 transition-colors">Odineck</a>
                <a href="https://exonoor.com" target="_blank" class="hover:text-emerald-500 transition-colors">Exonoor</a>
                <a href="https://npmjs.com/package/@odineck/elite-ui" target="_blank" class="hover:text-emerald-500 transition-colors">NPM</a>
            </div>
        </div>
    </footer>

    <!-- Single Entry Point -->
    <script src="app.js"></script>
</body>
</html>
