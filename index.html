<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteUI - Vanilla JS Framework</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="bg-white dark:bg-black text-zinc-900 dark:text-zinc-100 min-h-screen">

    <!-- Templates -->
    <template id="tmpl-ThemeToggle">
        <button data-onclick="toggle" class="w-9 h-9 rounded-lg border border-zinc-200 dark:border-zinc-700 flex items-center justify-center transition-colors hover:border-green-600">
            <svg data-show="theme === 'light'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg data-show="theme === 'dark'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
    </template>

    <template id="tmpl-Hero">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-center mb-8">
            <div class="lg:col-span-2 p-0">
                <h1 class="text-5xl lg:text-6xl font-extrabold tracking-tight mb-5 leading-tight" data-text="title"></h1>
                <p class="text-lg text-zinc-600 dark:text-zinc-400 mb-8 leading-relaxed" data-text="subtitle"></p>
                <div class="flex flex-wrap gap-3" data-outlet="buttons"></div>
            </div>
            <div class="hidden lg:flex items-center justify-center bg-zinc-100 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl min-h-[300px]">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-24 h-24 text-green-600 dark:text-green-400 opacity-40">
                    <polyline points="16 18 22 12 16 6"></polyline>
                    <polyline points="8 6 2 12 8 18"></polyline>
                </svg>
            </div>
        </div>
    </template>

    <template id="tmpl-FeatureCard">
        <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl p-5 h-full">
            <div class="mb-4 text-green-600 dark:text-green-400">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5" data-html="icon"></svg>
            </div>
            <h3 class="font-bold text-sm mb-2" data-text="title"></h3>
            <p class="text-sm text-zinc-600 dark:text-zinc-400 leading-relaxed" data-text="description"></p>
        </div>
    </template>

    <template id="tmpl-Counter">
        <div class="flex flex-col gap-3 p-4 border border-zinc-200 dark:border-zinc-800 rounded-lg bg-zinc-50 dark:bg-zinc-900 max-w-[200px]">
            <span class="text-sm font-semibold text-zinc-600 dark:text-zinc-400 capitalize" data-text="label"></span>
            <div class="flex items-center gap-3 justify-center">
                <button data-onclick="decrement" data-bind-disabled="count <= min" class="w-8 h-8 border border-zinc-300 dark:border-zinc-600 bg-white dark:bg-zinc-800 text-zinc-900 dark:text-zinc-100 rounded font-bold hover:border-green-600 hover:text-green-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">−</button>
                <span class="text-2xl font-extrabold text-green-600 dark:text-green-400 min-w-[40px] text-center" data-text="count"></span>
                <button data-onclick="increment" data-bind-disabled="count >= max" class="w-8 h-8 border border-zinc-300 dark:border-zinc-600 bg-white dark:bg-zinc-800 text-zinc-900 dark:text-zinc-100 rounded font-bold hover:border-green-600 hover:text-green-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">+</button>
            </div>
        </div>
    </template>

    <header class="sticky top-0 z-50 bg-white/80 dark:bg-black/80 backdrop-blur-sm border-b border-zinc-200 dark:border-zinc-800">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="#/" class="flex items-center gap-2 font-bold text-xl tracking-tight">
                <span class="w-2.5 h-2.5 bg-green-600 rounded"></span>
                EliteUI
            </a>
            <div id="theme-toggle"></div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-8">
        <section id="hero-section"></section>
        
        <section class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-8">
            <div id="feature-1"></div>
            <div id="feature-2"></div>
            <div id="feature-3"></div>
        </section>
        
        <section id="counter-section" class="flex gap-4 mt-8"></section>
    </main>

    <footer class="border-t border-zinc-200 dark:border-zinc-800 mt-16">
        <div class="max-w-6xl mx-auto px-6 py-8 flex items-center justify-between text-sm text-zinc-500">
            <p>© 2026 Odineck</p>
            <div class="flex gap-6">
                <a href="https://odineck.com" target="_blank" class="hover:text-green-600 transition-colors">Odineck</a>
                <a href="https://exonoor.com" target="_blank" class="hover:text-green-600 transition-colors">Exonoor</a>
                <a href="https://npmjs.com/package/@odineck/elite-ui" target="_blank" class="hover:text-green-600 transition-colors">NPM</a>
            </div>
        </div>
    </footer>

    <!-- Framework Core -->
    <script src="core/SimpleComponent.js"></script>
    <script src="core/Router.js"></script>
    <script src="core/http.js"></script>
    <script src="core/debug.js"></script>
    <script src="core/schema.js"></script>
    <script src="components/index.js"></script>
    
    <!-- Components -->
    <script src="components/ThemeToggle/ThemeToggle.js"></script>
    <script src="components/Hero/Hero.js"></script>
    <script src="components/FeatureCard/FeatureCard.js"></script>
    <script src="components/Counter/Counter.js"></script>
    
    <!-- Bootstrap -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Init router
            window.router = new Router({ useHash: true })
            window.$router = router
            
            // Mount ThemeToggle
            const savedTheme = localStorage.getItem('elite-theme')
            const themeToggle = new ThemeToggle('#theme-toggle', { theme: savedTheme || 'light' })
            themeToggle.mount()
            
            // Mount Hero
            const hero = new Hero('#hero-section', {
                title: 'Vanilla JS Framework',
                subtitle: 'Zero dependencies. Security first. Production ready infrastructure for modern web apps.',
                buttons: [
                    { label: 'Install', href: 'https://npmjs.com/package/@odineck/elite-ui', variant: 'primary', target: '_blank' },
                    { label: 'View Example', href: '#/example', variant: 'secondary' }
                ]
            })
            hero.mount()
            
            // Mount FeatureCards
            const features = [
                { title: 'Secure', description: 'Built-in XSS protection, CSRF tokens, and sanitization.', icon: '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path>' },
                { title: 'Fast', description: 'Pure vanilla JavaScript with direct DOM manipulation.', icon: '<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>' },
                { title: 'Reactive', description: 'SimpleComponent and SimpleStore for reactive state.', icon: '<circle cx="12" cy="12" r="3"></circle><line x1="12" y1="5" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="19"></line>' }
            ]
            
            features.forEach((f, i) => {
                const fc = new FeatureCard('#feature-' + (i + 1), f)
                fc.mount()
            })
            
            // Mount Counter
            const counter = new Counter('#counter-section', {
                label: 'Counter',
                initialCount: 0,
                min: 0,
                max: 10
            })
            counter.mount()
            
            console.log('[EliteUI] Ready')
        })
    </script>
</body>
</html>
