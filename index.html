<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteUI - Vanilla JS Framework</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        emerald: { 500: '#10b981' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="min-h-screen selection:bg-emerald-500/30 dark:bg-zinc-900 dark:text-zinc-100">

    <!-- Templates -->
    <template id="tmpl-component-theme-toggle">
        <button data-onclick="toggle" class="w-9 h-9 rounded-lg border border-zinc-200 dark:border-zinc-700 flex items-center justify-center transition-all hover:border-emerald-500 hover:bg-emerald-500/5 group">
            <svg data-if="theme === 'light'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg data-if="theme === 'dark'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
    </template>

    <template id="tmpl-component-hero">
        <div class="grid grid-cols-1 lg:grid-cols-5 gap-5 items-stretch mb-8">
            <div class="lg:col-span-3 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-[24px] p-10 flex flex-col justify-center reveal-1">
                <h1 class="text-4xl lg:text-6xl font-black tracking-tight mb-5 leading-[1.1] text-zinc-900 dark:text-white" data-text="title"></h1>
                <p class="text-[15px] text-zinc-500 dark:text-zinc-400 mb-8 leading-relaxed max-w-lg" data-text="subtitle"></p>
                <div class="flex flex-wrap gap-3" data-outlet="buttons"></div>
            </div>
            <div class="lg:col-span-2 bg-zinc-50 dark:bg-zinc-900/40 border border-zinc-200 dark:border-zinc-800 rounded-[24px] p-10 flex flex-col items-center justify-center relative overflow-hidden group reveal-2">
                <div class="absolute inset-0 bg-gradient-to-br from-emerald-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-1000"></div>
                <div class="w-20 h-20 rounded-3xl bg-white dark:bg-zinc-900 shadow-xl dark:shadow-black/50 flex items-center justify-center mb-6 relative z-10 animate-float">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-10 h-10 text-emerald-500">
                        <polyline points="16 18 22 12 16 6"></polyline>
                        <polyline points="8 6 2 12 8 18"></polyline>
                    </svg>
                </div>
                <div class="text-center relative z-10">
                    <span class="text-[10px] font-black uppercase tracking-[0.2em] text-emerald-600 dark:text-emerald-400">Enterprise Framework</span>
                    <p class="text-[11px] text-zinc-400 mt-2 font-medium opacity-60">ODINECK TECHNOLOGY © 2026</p>
                </div>
            </div>
        </div>
    </template>

    <template id="tmpl-component-feature-card">
        <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-[24px] p-6 group h-full">
            <div class="w-10 h-10 rounded-xl bg-emerald-500/5 flex items-center justify-center mb-4 group-hover:bg-emerald-500 group-hover:text-white transition-all duration-500 group-hover:shadow-lg group-hover:shadow-emerald-500/20">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5" data-html="icon"></svg>
            </div>
            <h3 class="font-bold text-[15px] mb-2 text-zinc-900 dark:text-white" data-text="title"></h3>
            <p class="text-[13px] text-zinc-500 dark:text-zinc-400 leading-relaxed" data-text="description"></p>
        </div>
    </template>

    <template id="tmpl-component-counter">
        <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-[24px] p-6 flex flex-col gap-4 min-w-[180px]">
            <span class="text-[10px] font-black text-zinc-400 dark:text-zinc-500 uppercase tracking-widest opacity-70" data-text="label"></span>
            <div class="flex items-center gap-5">
                <button data-onclick="decrement" data-bind-disabled="count <= min" class="w-8 h-8 border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 text-zinc-900 dark:text-zinc-100 rounded-xl font-bold hover:border-emerald-500 hover:text-emerald-500 transition-all active:scale-90 disabled:opacity-20">−</button>
                <span class="text-2xl font-black text-emerald-600 dark:text-emerald-400 tabular-nums tracking-tighter" data-text="count"></span>
                <button data-onclick="increment" data-bind-disabled="count >= max" class="w-8 h-8 border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 text-zinc-900 dark:text-zinc-100 rounded-xl font-bold hover:border-emerald-500 hover:text-emerald-500 transition-all active:scale-90 disabled:opacity-20">+</button>
            </div>
        </div>
    </template>

    <header class="sticky top-0 z-50 backdrop-blur-xl bg-white/80 dark:bg-zinc-900/80 border-b border-zinc-200 dark:border-zinc-800">
        <div class="max-w-6xl mx-auto px-6 py-3.5 flex items-center justify-between">
            <a href="#/" class="flex items-center gap-2.5 font-black text-lg tracking-tighter hover:opacity-70 transition-opacity text-zinc-900 dark:text-white">
                <div class="w-2.5 h-2.5 bg-emerald-500 rounded-full shadow-[0_0_12px_rgba(16,185,129,0.6)]"></div>
                EliteUI
            </a>
            <div id="component-theme-toggle"></div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-8">
        <section id="component-hero"></section>
        
        <section class="grid grid-cols-1 md:grid-cols-4 gap-5 mt-2">
            <div id="feature-1" class="reveal-3"></div>
            <div id="feature-2" class="reveal-4"></div>
            <div id="feature-3" class="reveal-5"></div>
            <div id="component-counter" class="md:col-span-1 reveal-5"></div>
        </section>
    </main>

    <footer class="border-t border-zinc-200 dark:border-zinc-800 mt-16">
        <div class="max-w-6xl mx-auto px-6 py-8 flex items-center justify-between text-sm text-zinc-500 dark:text-zinc-400">
            <p>© 2026 Odineck</p>
            <div class="flex gap-6">
                <a href="https://odineck.com" target="_blank" class="hover:text-emerald-500 transition-colors">Odineck</a>
                <a href="https://exonoor.com" target="_blank" class="hover:text-emerald-500 transition-colors">Exonoor</a>
                <a href="https://npmjs.com/package/@odineck/elite-ui" target="_blank" class="hover:text-emerald-500 transition-colors">NPM</a>
            </div>
        </div>
    </footer>

    <!-- Single Entry Point -->
    <script src="app.js"></script>
</body>
</html>
