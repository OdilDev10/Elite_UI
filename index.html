<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteUI - Vanilla JS Framework</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- EliteUI CSS Theme -->
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="bg-bg-primary text-text-primary min-h-screen">

    <!-- Header -->
    <header class="border-b border-border bg-bg-primary sticky top-0 z-50">
        <div class="container flex items-center justify-between">
            <div class="logo">EliteUI</div>
            <div id="theme-toggle-container"></div>
        </div>
    </header>

    <!-- Tab Navigation (mounted by bootstrap.js) -->
    <nav id="tabs-nav"></nav>

    <!-- Main Content -->
    <main class="container py-8">
        <div id="tab-content"></div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-border mt-16">
        <div class="container py-8">
            <div class="footer-content">
                <p>&copy; 2026 Odineck</p>
                <div class="footer-links">
                    <a href="https://odineck.com" target="_blank">Odineck</a>
                    <a href="https://exonoor.com" target="_blank">Exonoor</a>
                    <a href="https://npmjs.com/package/@exonoor/elite-ui" target="_blank">NPM</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Framework Core (loaded synchronously) -->
    <script src="components/index.js"></script>
    <script src="core/http.js"></script>
    <script src="core/debug.js"></script>
    <script src="core/schema.js"></script>

    <!-- Framework Modules (loaded asynchronously, in order) -->
    <script type="module" src="core/index.js"></script>
    <script type="module" src="core/ModuleLoader.js"></script>

    <!-- Application Bootstrap (unique entry point) -->
    <script type="module" src="pages/bootstrap.js"></script>

</body>
</html>
